<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bogart Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loader">Bogart Store...</div>

<header>
    <h1>🛍 Bogart Store</h1>

    <div class="header-right">
        <input type="text" id="search" placeholder="Rechercher..." onkeyup="searchProducts()">

        <div class="counters">
            🛒 <span id="cart-count">0</span>
            ❤️ <span id="wish-count">0</span>
        </div>
    </div>
</header>

<div class="filters">
    <button onclick="filterProducts('all')">Tous</button>
    <button onclick="filterProducts('iphone')">iPhone</button>
    <button onclick="filterProducts('samsung')">Samsung</button>
    <button onclick="filterProducts('macbook')">MacBook</button>
    <button onclick="filterProducts('accessoire')">Accessoires</button>
</div>

<h2 class="section-title">Nos Produits</h2>

<div id="products"></div>

<h2 class="section-title">Mon Panier</h2>
<div id="cart"></div>
<img src="images/iphone14.jpg" width="200">
<footer>
    <p>© 2026 Bogart Store - Tous droits réservés</p>
</footer>

<script src="script.js"></script>

</body>
</html>
