<<!DOCTYPE html>
<html>
<head>
  <title>Panier</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🛒 Mon Panier</h1>

<div id="cart"></div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let container = document.getElementById("cart");

let total = 0;

cart.forEach(item => {
  total += item.price;
  container.innerHTML += `
    <div class="card">
      <h3>${item.name}</h3>
      <p>${item.price} TND</p>
    </div>
  `;
});

container.innerHTML += `<h2>Total: ${total} TND</h2>`;
</script>

</body>
</html>
